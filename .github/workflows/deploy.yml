name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger server deploy
        run: |
          PAYLOAD='{"ref":"${{ github.ref }}","repository":{"name":"${{ github.repository }}"}}'
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print $NF}')"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}"             -X POST             -H "X-Hub-Signature-256: $SIGNATURE"             -H "Content-Type: application/json"             -d "$PAYLOAD"             "https://souq.gg/webhook/deploy")
          echo "Deploy webhook response: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "Deploy failed with HTTP $RESPONSE"
            exit 1
          fi
